<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control CEO - TAXI A CIMCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #e2e8f0; /* bg-slate-200 */
        }
    </style>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Configuración de Firebase - Reemplazar con tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyCseKkOoHY8pbSnUWSEWyPR8et1BVccr7s",
            authDomain: "pelagic-chalice-467818-e1.firebaseapp.com",
            projectId: "pelagic-chalice-467818-e1",
            storageBucket: "pelagic-chalice-467818-e1.firebasestorage.app",
            messagingSenderId: "191106268804",
            appId: "1:191106268804:web:8b2aa9689abaa35c880cd1",
            measurementId: "G-CPWSCLGKP2"
        };
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencias a los elementos del DOM
        const pendingRidesList = document.getElementById('pending-rides-list');
        const activeDriversList = document.getElementById('active-drivers-list');

        // Función para renderizar los viajes pendientes
        const renderPendingRides = (rides) => {
            pendingRidesList.innerHTML = ''; // Limpiar la lista
            if (rides.length === 0) {
                pendingRidesList.innerHTML = '<p class="text-gray-500">No hay viajes pendientes.</p>';
            } else {
                rides.forEach(ride => {
                    const li = document.createElement('li');
                    li.className = 'bg-white p-4 rounded-lg shadow mb-2';
                    li.innerHTML = `
                        <p class="font-semibold">Viaje ID: ${ride.id}</p>
                        <p>De: <span class="text-gray-600">${ride.passengerLocation}</span></p>
                        <p>A: <span class="text-gray-600">${ride.destination}</span></p>
                        <p>Estado: <span class="text-yellow-600 font-semibold">${ride.status}</span></p>
                    `;
                    pendingRidesList.appendChild(li);
                });
            }
        };

        // Escuchar los viajes pendientes en tiempo real
        // Esta es una versión simplificada; en un sistema real, los conductores también tendrían un estado en su perfil
        // y se usarían reglas de seguridad más estrictas
        const pendingRidesQuery = query(collection(db, 'viajes'), where('status', '==', 'pending'));
        onSnapshot(pendingRidesQuery, (snapshot) => {
            const pendingRides = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderPendingRides(pendingRides);
        });

        // NOTA: Para los conductores, necesitaríamos una nueva colección 'conductores' para rastrear su estado.
        // Aquí se simula la lógica.
        const renderActiveDrivers = (drivers) => {
             activeDriversList.innerHTML = '';
             if (drivers.length === 0) {
                 activeDriversList.innerHTML = '<p class="text-gray-500">No hay conductores activos.</p>';
             } else {
                 drivers.forEach(driver => {
                     const li = document.createElement('li');
                     li.className = 'bg-white p-4 rounded-lg shadow mb-2';
                     li.innerHTML = `<p class="font-semibold">Conductor ID: ${driver.id}</p>`;
                     activeDriversList.appendChild(li);
                 });
             }
         };
         // Este es un ejemplo de cómo se podría hacer si existiera una colección 'conductores'
         // const activeDriversQuery = query(collection(db, 'conductores'), where('status', '==', 'available'));
         // onSnapshot(activeDriversQuery, (snapshot) => {
         //     const activeDrivers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
         //     renderActiveDrivers(activeDrivers);
         // });

         // Para este prototipo, mostramos una lista de ejemplo de conductores activos
         renderActiveDrivers([
             { id: "Conductor-001" },
             { id: "Conductor-002" }
         ]);
    </script>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Panel de Control CEO</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Sección de Viajes Pendientes -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Viajes Pendientes</h2>
                <ul id="pending-rides-list" class="space-y-4">
                    <!-- Los viajes pendientes se cargarán aquí -->
                </ul>
            </div>

            <!-- Sección de Conductores Activos -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Conductores Activos</h2>
                <ul id="active-drivers-list" class="space-y-4">
                    <!-- Los conductores activos se cargarán aquí -->
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
