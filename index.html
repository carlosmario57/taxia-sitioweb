<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxia - Gestión de Despachos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
    </style>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-md py-4">
        <div class="container flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Taxia</h1>
            <nav>
                <a href="index.html" class="text-blue-600 font-semibold mx-2">Inicio</a>
                <a href="acerca-de.html" class="text-gray-600 hover:text-blue-600 mx-2">Acerca de Nosotros</a>
                <button id="cerrar-sesion" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <main class="container mt-8">
        <!-- Contenido principal de la página, visible después de iniciar sesión -->
        <div id="dashboard" class="hidden">
            <h2 class="text-3xl font-semibold text-gray-800 mb-6">Gestión de Despachos</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Tarjeta para el conductor -->
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Controles y Estado</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-600">Conductor (provisional)</span>
                        <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">Estado: Libre</button>
                    </div>
                </div>

                <!-- Tarjeta para el cliente -->
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Clientes</h3>
                    <button class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors">Solicitar GPS Cliente</button>
                </div>

                <!-- Tarjeta para la ubicación -->
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Notas de Ubicación</h3>
                    <p class="text-gray-600">
                        Ubicación del Conductor:<br>
                        Calle 123 #45-67, La Jagua de Ibirico, Colombia
                    </p>
                    <p class="text-gray-600 mt-4">
                        Ubicación del Cliente:<br>
                        Calle 987 #65-43, La Jagua de Ibirico, Colombia
                    </p>
                </div>
            </div>
            <button class="mt-6 bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-600 transition-colors">Mostrar Ruta</button>
        </div>

        <!-- Formulario de inicio de sesión, visible si el usuario no ha iniciado sesión -->
        <div id="login-form" class="bg-white p-8 rounded-lg shadow-xl max-w-sm mx-auto mt-20">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
            <form>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-semibold mb-2">Correo Electrónico</label>
                    <input type="email" id="email" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 font-semibold mb-2">Contraseña</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex justify-between">
                    <button type="submit" class="bg-blue-500 text-white font-semibold px-6 py-2 rounded-lg hover:bg-blue-600 transition-colors">Iniciar Sesión</button>
                    <button type="button" class="bg-gray-200 text-gray-800 font-semibold px-6 py-2 rounded-lg hover:bg-gray-300 transition-colors">Registrarse</button>
                </div>
                <p id="error-message" class="text-red-500 text-center mt-4"></p>
            </form>
        </div>
    </main>

    <script>
        // Aquí iría la lógica para manejar el inicio de sesión y el cambio entre formularios
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const cerrarSesionBtn = document.getElementById('cerrar-sesion');

        // Para simular el estado de sesión
        let loggedIn = false;

        function updateUI() {
            if (loggedIn) {
                loginForm.classList.add('hidden');
                dashboard.classList.remove('hidden');
                cerrarSesionBtn.classList.remove('hidden');
            } else {
                loginForm.classList.remove('hidden');
                dashboard.classList.add('hidden');
                cerrarSesionBtn.classList.add('hidden');
            }
        }

        document.querySelector('#login-form form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simular un intento de inicio de sesión
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email === 'admin@taxia.com' && password === 'password123') {
                loggedIn = true;
                updateUI();
                errorMessage.textContent = '';
            } else {
                errorMessage.textContent = 'Error: Correo o contraseña incorrectos.';
            }
        });

        cerrarSesionBtn.addEventListener('click', () => {
            loggedIn = false;
            updateUI();
        });

        // Inicializar la UI al cargar la página
        updateUI();
    </script>
</body>
</html>
